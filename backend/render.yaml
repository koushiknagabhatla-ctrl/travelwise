services:
  - type: web
    name: travelwise-backend
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5002
      - key: DATABASE_URL
        fromDatabase:
          name: travelwise-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://travelwise-frontend.vercel.app # Replace with your actual Vercel URL
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: AVIATIONSTACK_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
